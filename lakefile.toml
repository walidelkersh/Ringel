name = "Ringel"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["Ringel"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
version = "git#v4.30.0"

[[lean_lib]]
name = "Ringel"
