name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
        with:
          use-mathlib-cache: true
      - name: Upload project Lean artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ringel-lean-${{ github.sha }}
          path: .lake/build/lib/lean/Ringel
          if-no-files-found: error
          retention-days: 7
